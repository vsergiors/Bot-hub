<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vSergiors • Hub de Bots</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    header {
      background: #BB27F5;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      color: #fff;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
    }
    .bot-card {
      background: #2c2c2c;
      padding: 1rem;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    }
    .bot-card h2 {
      margin-top: 0;
      color: #2ecc71;
    }
    .bot-card p {
      font-size: 0.9rem;
      margin: 1rem 0;
    }
    .bot-card a {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      text-decoration: none;
      color: #fff;
      background: #BB27F5;
      transition: 0.3s;
    }
    .bot-card a:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>

<header>
  <h1>Hub de Bots de Discord</h1>
</header>

<div class="container">
  <!-- Bot 1 -->
  <div class="bot-card">
    <h2>BotName1</h2>
    <p>Este bot hace X, Y y Z. Puedes encenderlo o añadirlo a tu servidor.</p>
    <a href="https://tu-link-para-encender-bot1.com" target="_blank">Encender Bot</a>
    <a href="https://discord.com/oauth2/authorize?client_id=ID_DEL_BOT1&scope=bot&permissions=8" target="_blank">Añadir al servidor</a>
  </div>

  <!-- Bot 2 -->
  <div class="bot-card">
    <h2>BotName2</h2>
    <p>Este bot hace A, B y C. Puedes encenderlo o añadirlo a tu servidor.</p>
    <a href="https://tu-link-para-encender-bot2.com" target="_blank">Encender Bot</a>
    <a href="https://discord.com/oauth2/authorize?client_id=ID_DEL_BOT2&scope=bot&permissions=8" target="_blank">Añadir al servidor</a>
  </div>

  <!-- Aquí puedes añadir más bots -->
</div>

</body>
</html>
